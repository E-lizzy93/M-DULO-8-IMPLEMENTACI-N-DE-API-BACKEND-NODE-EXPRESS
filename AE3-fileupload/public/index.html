<!doctype html>
<html lang="es">

<head>

    <meta charset="utf-8">
    <title>Subir imagen</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5" style="max-width:700px">

        <h2 class="mb-4">Subir imagen</h2>

        <form id="formUpload" enctype="multipart/form-data" class="border p-4 bg-white rounded">

            <div class="mb-3">

                <label class="form-label">Selecciona una imagen</label>

                <input type="file" class="form-control" name="foto" accept="image/*" required>

            </div>

            <button class="btn btn-primary">Subir imagen</button>

        </form>

        <div id="mensaje" class="mt-3"></div>

    </div>

    <script>

        const form = document.getElementById("formUpload")
        const mensaje = document.getElementById("mensaje")

        form.addEventListener("submit", async (e) => {

            e.preventDefault()

            const formData = new FormData(form)

            const res = await fetch("/upload", {
                method: "POST",
                body: formData
            })

            const data = await res.json()

            mensaje.innerHTML = `
<div class="alert ${data.ok ? "alert-success" : "alert-danger"}">
${data.mensaje}
</div>
`

        })

    </script>

</body>

</html>
